<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            font-size: 13px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0 12px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 6px rgba(74,144,226,0.3);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #218838;
        }

        .link {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            color: #4a90e2;
            font-weight: bold;
        }

        .link:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">
    <h2>Add Student</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Student ID</label>
        <input type="text" name="student_id">

        <label>Name</label>
        <input type="text" name="full_name">

        <label>DOB</label>
        <input type="date" name="dob">

        <label>Gender</label>
        <input type="text" name="gender">

        <label>Email</label>
        <input type="email" name="email">

        <label>Phone</label>
        <input type="text" name="phone">

        <label>Address</label>
        <input type="text" name="address">

        <label>Course</label>
        <input type="text" name="course">

        <label>Year</label>
        <input type="number" name="year">

        <label>GPA</label>
        <input type="number" step="0.01" name="gpa">

        <button type="submit">Save Student</button>

        <a class="link" href="/list/">View All Students</a>
    </form>
</div>

</body>
</html>
