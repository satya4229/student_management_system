<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            font-size: 13px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0 12px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 5px rgba(74,144,226,0.3);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4a90e2;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #357ab8;
        }

    </style>
</head>

<body>

<div class="container">
    <h2>Edit Student</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Student ID</label>
        <input type="text" name="student_id" value="{{ student.student_id }}" readonly>

        <label>Name</label>
        <input type="text" name="full_name" value="{{ student.full_name }}">

        <label>DOB</label>
        <input type="date" name="dob" value="{{ student.dob |date:'Y-m-d' }}">

        <label>Gender</label>
        <input type="text" name="gender" value="{{ student.gender }}">

        <label>Email</label>
        <input type="email" name="email" value="{{ student.email }}">

        <label>Phone</label>
        <input type="text" name="phone" value="{{ student.phone }}">

        <label>Address</label>
        <input type="text" name="address" value="{{ student.address }}">

        <label>Course</label>
        <input type="text" name="course" value="{{ student.course }}">

        <label>Year</label>
        <input type="number" name="year" value="{{ student.year }}">

        <label>GPA</label>
        <input type="number" step="0.01" name="gpa" value="{{ student.gpa }}">

        <button type="submit">Update Student</button>
    </form>
</div>

</body>
</html>
